# 🚀 TELEHEALTH PORTAL DEPLOYMENT WORKFLOW
# This GitHub Action automates the direct deployment of the Telehealth Static Portal.
# 
# DESIGN:
# 1. NO BUILD STEP: Files are synced directly (HTML/JS/CSS).
# 2. ENVIRONMENT SELECTOR: Choose 'live' or 'dev' during manual trigger.
# 3. OIDC AUTH: Uses temporary, secure role assumption instead of static keys.

name: Deploy Telehealth Portal to S3
on:
  workflow_dispatch:
    inputs:
      group:
        description: 'Target Group (Security & AWS Account)'
        required: true
        default: 'live'
        type: choice
        options:
          - live
          - dev
          - mgmt
      environment:
        description: 'Target Environment (Resource Prefix)'
        required: true
        default: 'prod'
        type: choice
        options:
          - prod
          - dev

permissions:
  id-token: write # Required for OIDC role assumption
  contents: read  # Required for actions/checkout

jobs:
  workflow_summary:
    name: Build Summary
    runs-on: ubuntu-latest
    steps:
      - name: 📝 Generate Runtime Summary
        run: |
          echo "## 🚀 Build Parameters Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Parameter | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Target Group** | `${{ github.event.inputs.group }}` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Target Prefix (Env)** | `${{ github.event.inputs.environment }}` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Repository** | `med2ai-telehealth-webportal` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit SHA** | `${{ github.sha }}` |" >> $GITHUB_STEP_SUMMARY
          echo "| **OIDC Auth** | ✅ Enabled |" >> $GITHUB_STEP_SUMMARY

  deploy:
    name: Deploy
    needs: workflow_summary
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.group }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-west-1

      - name: Inject Environment Variables
        run: |
          sed -i "s|__VITE_API_URL__|${{ secrets.VITE_API_URL }}|g" app.js
          sed -i "s|__VITE_AGORA_APP_ID__|${{ secrets.AGORA_APP_ID }}|g" app.js
          
      - name: Deploy to S3
        run: |
          aws s3 sync . s3://med2ai-${{ github.event.inputs.environment }}-nexus-tele-portal --delete --exclude ".git*" --exclude ".github*"
          
      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DIST_ID_TELE }} \
            --paths "/*"
